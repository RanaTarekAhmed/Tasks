<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rana's Pantry Finder — Search Meals by Ingredient</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">Rana's Pantry Finder</p>
      <h1>What's in your kitchen<span class="accent-dot">?</span></h1>
      <p class="subhead">
        Type an ingredient eg. : garlic, chicken, lemon,.. —> and find meals built around it!
      </p>
    </header>

    <section class="search-bar" aria-label="Search meals by ingredient">
      <input
        type="text"
        id="ingredientInput"
        placeholder="e.g. garlic, chicken, basil..."
        aria-label="Ingredient"
      />
      <button id="searchBtn" type="button">Search</button>
    </section>

    <p id="resultsInfo" class="results-info" aria-live="polite"></p>

    <main id="resultsGrid" class="results-grid"></main>
  </div>


  <script src="javascript.js"></script>
</body>
</html>
